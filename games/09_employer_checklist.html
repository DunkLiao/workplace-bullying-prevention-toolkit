<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>雇主義務任務清單｜職場霸凌防治</title>
<style>
:root{--navy:#1a3a5c;--navy-dark:#122a44;--navy-light:#2a5080;--gold:#c9a84c;--gold-light:#f0d080;--bg:#f4f7fb;--card-bg:#fff;--text:#1e2a38;--text-muted:#5a6a7a;--border:#d0dce8;--correct:#1e7e44;--correct-bg:#e6f9ed;--wrong:#b91c1c;--wrong-bg:#fde8e8;--warn:#b45309;--warn-bg:#fff7e6;--radius:12px;--shadow:0 4px 20px rgba(26,58,92,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px}
.container{width:100%;max-width:720px}
.game-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.game-header .logo-badge{width:44px;height:44px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.game-header h1{font-size:17px;color:var(--navy);font-weight:700;line-height:1.35}
.game-header p{font-size:12px;color:var(--text-muted);margin-top:2px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;border:1px solid var(--border)}
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:12px 8px;border:2px solid var(--border);border-radius:10px;background:var(--bg);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center}
.tab-btn:hover{border-color:var(--navy-light)}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.tab-sub{font-size:10px;font-weight:400;display:block;opacity:.8}
.checklist{margin-bottom:20px}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--bg);border-radius:10px;margin-bottom:8px;border:2px solid var(--border);cursor:pointer;transition:all .2s}
.check-item:hover{border-color:var(--navy-light)}
.check-item.checked{border-color:var(--correct);background:var(--correct-bg)}
.check-item.checked .check-box{background:var(--correct);border-color:var(--correct)}
.check-item.checked .check-box::after{content:'✓';color:#fff;font-size:16px;font-weight:800}
.check-item.wrong-check{border-color:var(--wrong);background:var(--wrong-bg)}
.check-item.wrong-check .check-box{background:var(--wrong);border-color:var(--wrong)}
.check-item.wrong-check .check-box::after{content:'✗';color:#fff;font-size:16px;font-weight:800}
.check-box{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.check-content{flex:1}
.check-title{font-weight:700;font-size:14px;color:var(--navy-dark)}
.check-desc{font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.5}
.check-law{font-size:11px;color:var(--navy-light);margin-top:4px;font-style:italic}
.score-area{text-align:center;padding:16px;background:var(--bg);border-radius:10px;margin-bottom:16px;border:1px solid var(--border)}
.score-text{font-size:15px;font-weight:700;color:var(--navy-dark)}
.score-bar-bg{background:var(--border);border-radius:99px;height:8px;margin-top:8px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:99px;transition:width .4s}
.btn-show-all{width:100%;background:var(--gold);color:var(--navy-dark);border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:8px}
.btn-show-all:hover{background:var(--gold-light)}
.footer-note{text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.card{padding:18px 12px}.tabs{flex-direction:column}.tab-btn{padding:10px}}
</style>
</head>
<body>
<div class="container">
<div class="game-header">
<div class="logo-badge">✅</div>
<div><h1>雇主义務任務清單</h1><p>勾選你認為正確的義務——測試你對雇主責任的了解！</p></div>
</div>

<div class="card">
<div class="tabs">
<button class="tab-btn active" onclick="switchTab(0)">🏢 10 人以上<span class="tab-sub">基本義務</span></button>
<button class="tab-btn" onclick="switchTab(1)">🏭 30 人以上<span class="tab-sub">進階義務</span></button>
<button class="tab-btn" onclick="switchTab(2)">🏛️ 100 人以上<span class="tab-sub">完整義務</span></button>
</div>

<div class="score-area">
<div class="score-text" id="score-text">請勾選你認為該規模事業單位應有的義務</div>
<div class="score-bar-bg"><div class="score-bar-fill" id="score-bar" style="width:0%;background:var(--correct)"></div></div>
</div>

<div class="checklist" id="checklist"></div>

<button class="btn-show-all" id="btn-check" onclick="checkAnswers()">🔍 檢查答案</button>
</div>
<p class="footer-note">依《職業安全衛生法》§22-2 及《職場霸凌防治措施準則》設計</p>
</div>

<script>
const ALL_ITEMS=[
{id:1,title:"設置申訴管道（電子信箱、專線、傳真等）",desc:"提供多元管道讓員工可提出霸凌申訴",law:"準則第 5 條",req10:true,req30:true,req100:true},
{id:2,title:"於工作場所公開揭示申訴管道資訊",desc:"讓所有員工知悉申訴方式與窗口",law:"準則第 5 條",req10:true,req30:true,req100:true},
{id:3,title:"訂定職場霸凌防治措施及申訴懲處規範",desc:"書面化防治政策與處理程序",law:"準則第 6 條",req10:false,req30:true,req100:true},
{id:4,title:"指定專責單位或人員統籌辦理防治業務",desc:"有明確的負責窗口處理霸凌防治事務",law:"準則第 6 條",req10:false,req30:true,req100:true},
{id:5,title:"提供全體人員職場霸凌防治教育訓練",desc:"每年定期辦理教育訓練，提升員工認知",law:"準則第 7 條",req10:false,req30:true,req100:true},
{id:6,title:"知悉事件後立即採取有效隔離等措施",desc:"避免霸凌持續或擴大，保護受害者",law:"職安法 §22-2",req10:true,req30:true,req100:true},
{id:7,title:"於受理申訴後 15 個工作日內組成調查小組",desc:"調查小組須外聘專業人士不少於 1/2",law:"準則第 11 條",req10:false,req30:false,req100:true},
{id:8,title:"設置申訴處理單位（至少 3 位成員）",desc:"任一性別比例不得少於 1/3",law:"準則第 9 條",req10:false,req30:true,req100:true},
{id:9,title:"不得因員工提出申訴而施以不利對待",desc:"含調職、減薪、降職等處分",law:"職安法 §22-4",req10:true,req30:true,req100:true},
{id:10,title:"申訴案件結案後紀錄至少保存 3 年",desc:"包含調查報告、決定書等相關文件",law:"準則第 18 條",req10:true,req30:true,req100:true},
{id:11,title:"對於第三人（如客戶）霸凌行為亦須有防治措施",desc:"包含 SOP 與事後關懷支持",law:"職安法 §22-2",req10:true,req30:true,req100:true},
{id:12,title:"維護申訴相關人員隱私，調查不公開",desc:"違反保密義務可能涉及刑事責任",law:"準則第 12 條",req10:true,req30:true,req100:true}
];

let currentTab=0;
let userChecks={0:new Set(),1:new Set(),2:new Set()};
let checked=false;

function s(id){return document.getElementById(id)}

function switchTab(tab){
currentTab=tab;
document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===tab));
renderChecklist();
}

function getRequired(tab){
return ALL_ITEMS.filter(it=>tab===0?it.req10:tab===1?it.req30:it.req100);
}

function toggleItem(id){
if(checked)return;
const set=userChecks[currentTab];
if(set.has(id))set.delete(id);else set.add(id);
renderChecklist();
updateScore();
}

function renderChecklist(){
const list=s('checklist');
const required=getRequired(currentTab);
const allItems=ALL_ITEMS;
const userSet=userChecks[currentTab];
list.innerHTML=allItems.map(it=>{
const req=currentTab===0?it.req10:currentTab===1?it.req30:it.req100;
const isChecked=userSet.has(it.id);
let cls='check-item';
if(checked){
if(req&&isChecked)cls+=' checked';
else if(!req&&isChecked)cls+=' wrong-check';
}
if(!checked&&isChecked)cls+=' checked';
return`<div class="${cls}" onclick="toggleItem(${it.id})">
<div class="check-box"></div>
<div class="check-content">
<div class="check-title">${it.title}</div>
<div class="check-desc">${it.desc}</div>
${checked?`<div class="check-law">📖 ${it.law}</div>`:''}
</div>
</div>`;
}).join('');
updateScore();
}

function updateScore(){
if(checked)return;
const set=userChecks[currentTab];
const required=getRequired(currentTab);
const correctChecks=required.filter(it=>set.has(it.id)).length;
const pct=required.length>0?(correctChecks/required.length)*100:0;
s('score-text').textContent=`已勾選 ${set.size} 項義務`;
s('score-bar').style.width=`${pct}%`;
s('score-bar').style.background=pct>=80?`var(--correct)`:pct>=50?`var(--gold)`:`var(--wrong)`;
}

function checkAnswers(){
checked=true;
const totalCorrect=[0,1,2].reduce((sum,tab)=>{
const required=tab===0?ALL_ITEMS.filter(it=>it.req10):tab===1?ALL_ITEMS.filter(it=>it.req30):ALL_ITEMS.filter(it=>it.req100);
const set=userChecks[tab];
return sum+required.filter(it=>set.has(it.id)).length;
},0);
const totalRequired=[0,1,2].reduce((sum,tab)=>{
return sum+(tab===0?ALL_ITEMS.filter(it=>it.req10):tab===1?ALL_ITEMS.filter(it=>it.req30):ALL_ITEMS.filter(it=>it.req100)).length;
},0);
const pct=Math.round((totalCorrect/totalRequired)*100);
s('score-text').textContent=`你答對了 ${totalCorrect}/${totalRequired} 項義務（${pct}%）`;
s('score-bar').style.width=`${pct}%`;
s('score-bar').style.background=pct>=80?`var(--correct)`:pct>=50?`var(--gold)`:`var(--wrong)`;
s('btn-check').textContent='🔄 重新挑戰';
s('btn-check').onclick=resetGame;
renderChecklist();
}

function resetGame(){
checked=false;
userChecks={0:new Set(),1:new Set(),2:new Set()};
s('score-text').textContent='請勾選你認為該規模事業單位應有的義務';
s('score-bar').style.width='0%';
s('btn-check').textContent='🔍 檢查答案';
s('btn-check').onclick=checkAnswers;
renderChecklist();
}

renderChecklist();
</script>
</body>
</html>
