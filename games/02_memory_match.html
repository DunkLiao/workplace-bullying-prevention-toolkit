<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>記憶翻牌配對｜職場霸凌防治法規術語</title>
<style>
:root{--navy:#1a3a5c;--navy-dark:#122a44;--navy-light:#2a5080;--gold:#c9a84c;--gold-light:#f0d080;--bg:#f4f7fb;--card-bg:#fff;--text:#1e2a38;--text-muted:#5a6a7a;--border:#d0dce8;--correct:#1e7e44;--wrong:#b91c1c;--radius:12px;--shadow:0 4px 20px rgba(26,58,92,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px}
.container{width:100%;max-width:720px}
.game-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.game-header .logo-badge{width:44px;height:44px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.game-header h1{font-size:17px;color:var(--navy);font-weight:700;line-height:1.35}
.game-header p{font-size:12px;color:var(--text-muted);margin-top:2px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;border:1px solid var(--border)}
.stats{display:flex;gap:16px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.stat-item{background:var(--bg);border-radius:10px;padding:12px 18px;text-align:center;border:1px solid var(--border);min-width:80px}
.stat-num{font-size:22px;font-weight:800;color:var(--navy)}
.stat-label{font-size:11px;color:var(--text-muted)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.mem-card{aspect-ratio:3/4;border-radius:10px;cursor:pointer;transition:transform .3s,box-shadow .2s;perspective:600px;min-height:100px}
.mem-card:hover:not(.matched){transform:scale(1.03)}
.mem-card-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.mem-card.flipped .mem-card-inner{transform:rotateY(180deg)}
.mem-card-front,.mem-card-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:10px;font-size:13px;text-align:center;line-height:1.5;border:2px solid var(--border)}
.mem-card-front{background:var(--navy);color:#fff;font-size:28px;font-weight:800;border-color:var(--navy)}
.mem-card-back{background:#fff;transform:rotateY(180deg);color:var(--text);font-weight:600;border-color:var(--border)}
.mem-card.matched .mem-card-back{border-color:var(--correct);background:var(--correct-bg);color:var(--correct)}
.mem-card.wrong-flash .mem-card-back{border-color:var(--wrong);background:var(--wrong-bg);animation:shake .4s}
.mem-card.term .mem-card-back{background:#eef3fa;border-color:var(--navy-light);color:var(--navy-dark);font-size:14px}
.mem-card.def .mem-card-back{font-size:12px;color:var(--text)}
@keyframes shake{0%,100%{transform:rotateY(180deg) translateX(0)}25%{transform:rotateY(180deg) translateX(-6px)}75%{transform:rotateY(180deg) translateX(6px)}}
.welcome-icon{font-size:52px;text-align:center;margin-bottom:16px}
.welcome-title{font-size:22px;font-weight:800;color:var(--navy-dark);text-align:center;margin-bottom:10px}
.welcome-subtitle{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:24px;line-height:1.7}
.btn-start{width:100%;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-start:hover{background:var(--navy-light)}
.result-wrap{text-align:center;margin-bottom:20px}
.congrats{font-size:22px;font-weight:800;color:var(--navy-dark);margin-bottom:8px}
.result-text{font-size:14px;color:var(--text-muted);line-height:1.7}
.btn-retry{width:100%;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:16px}
.btn-retry:hover{background:var(--navy-light)}
.footer-note{text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;line-height:1.6}
.screen{animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.grid{grid-template-columns:repeat(3,1fr);gap:8px}.mem-card{min-height:80px;font-size:11px}.mem-card-back{font-size:11px!important}.mem-card.term .mem-card-back{font-size:12px!important}}
</style>
</head>
<body>
<div class="container">
<div class="game-header">
<div class="logo-badge">🧠</div>
<div><h1>記憶翻牌配對</h1><p>翻開卡片，找出法規術語與解釋的配對</p></div>
</div>

<div id="screen-welcome" class="screen">
<div class="card">
<div class="welcome-icon">🃏</div>
<h2 class="welcome-title">法規術語記憶挑戰</h2>
<p class="welcome-subtitle">翻開卡片，找到術語與定義的配對。<br>測驗你對職場霸凌防治法規關鍵詞的認識！</p>
<div class="stats">
<div class="stat-item"><div class="stat-num">8</div><div class="stat-label">組配對</div></div>
<div class="stat-item"><div class="stat-num">16</div><div class="stat-label">張卡片</div></div>
<div class="stat-item"><div class="stat-num">~2</div><div class="stat-label">分鐘挑戰</div></div>
</div>
<button class="btn-start" onclick="startGame()">開始翻牌 →</button>
</div>
<p class="footer-note">依《職業安全衛生法》第二章之一設計，僅供教育訓練使用</p>
</div>

<div id="screen-game" class="screen" style="display:none">
<div class="card">
<div class="stats">
<div class="stat-item"><div class="stat-num" id="moves">0</div><div class="stat-label">步數</div></div>
<div class="stat-item"><div class="stat-num" id="pairs">0</div><div class="stat-label">已配對</div></div>
<div class="stat-item"><div class="stat-num" id="timer">0</div><div class="stat-label">秒數</div></div>
</div>
<div class="grid" id="grid"></div>
<button class="btn-retry" onclick="resetGame()">🔄 重新開始</button>
</div>
</div>

<div id="screen-done" class="screen" style="display:none">
<div class="card">
<div class="result-wrap">
<div class="congrats">🎉 恭喜完成！</div>
<p class="result-text" id="done-text"></p>
</div>
<div id="done-pairs" style="background:var(--bg);border-radius:10px;padding:16px;margin-bottom:16px;font-size:13px;line-height:1.8"></div>
<button class="btn-retry" onclick="resetGame()">🔄 再玩一次</button>
</div>
<p class="footer-note">法規如有異動，請以勞動部最新公告為準</p>
</div>
</div>

<script>
const PAIRS=[
{term:"持續性",def:"行為反覆發生，非單次事件即可能構成霸凌"},
{term:"不利對待禁止",def:"雇主不得因員工提出申訴而施以調職、減薪、降職等處分（§22-4）"},
{term:"第三人霸凌",def:"客戶、廠商等非雇主或同事之人對勞工的霸凌行為，雇主仍有防治義務"},
{term:"調查小組",def:"百人以上事業單位須於受理申訴後 15 個工作日內組成，外聘不少於 1/2"},
{term:"申復機制",def:"當事人不服申訴決定，可於收到決定翌日起 30 日內提起，一次為限"},
{term:"保密原則",def:"調查不公開，相關人員身分資料應保密，違反可能涉及刑責"},
{term:"利益迴避",def:"與當事人有親屬、權利義務等關係者，不得參與調查處理"},
{term:"最高負責人申訴",def:"若被申訴人為董事長等最高負責人，勞工得逕向地方主管機關申訴"}
];

let cards=[], flipped=[], matched=new Set(), moves=0, pairsFound=0, lock=false, timerSec=0, timerInt=null;

function s(id){return document.getElementById(id)}
function showScreen(id){['screen-welcome','screen-game','screen-done'].forEach(x=>s(x).style.display='none');s(id).style.display='block';window.scrollTo(0,0)}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startGame(){
cards=[];flipped=[];matched=new Set();moves=0;pairsFound=0;lock=false;timerSec=0;
if(timerInt)clearInterval(timerInt);
PAIRS.forEach((p,i)=>{
cards.push({id:i,type:'term',text:p.term,pairId:i});
cards.push({id:i,type:'def',text:p.def,pairId:i});
});
cards=shuffle(cards);
showScreen('screen-game');
updateStats();
renderGrid();
timerInt=setInterval(()=>{timerSec++;s('timer').textContent=timerSec},1000);
}

function updateStats(){s('moves').textContent=moves;s('pairs').textContent=pairsFound}

function renderGrid(){
const grid=s('grid');
grid.innerHTML='';
cards.forEach((c,idx)=>{
const div=document.createElement('div');
div.className='mem-card '+c.type;
if(matched.has(c.pairId)) div.classList.add('matched');
if(flipped.includes(idx)) div.classList.add('flipped');
div.innerHTML=`<div class="mem-card-inner"><div class="mem-card-front">?</div><div class="mem-card-back">${c.text}</div></div>`;
div.onclick=()=>flipCard(idx,div);
grid.appendChild(div);
});
}

function flipCard(idx,el){
if(lock||flipped.includes(idx)||matched.has(cards[idx].pairId))return;
flipped.push(idx);
el.classList.add('flipped');
if(flipped.length===2){
moves++;updateStats();
const c1=cards[flipped[0]],c2=cards[flipped[1]];
if(c1.pairId===c2.pairId&&c1.type!==c2.type){
matched.add(c1.pairId);pairsFound++;updateStats();
flipped=[];
if(pairsFound===PAIRS.length){
clearInterval(timerInt);
setTimeout(showDone,600);
}
}else{
lock=true;
setTimeout(()=>{
document.querySelectorAll('.mem-card').forEach(c=>c.classList.add('wrong-flash'));
setTimeout(()=>{
document.querySelectorAll('.mem-card').forEach(c=>c.classList.remove('wrong-flash'));
flipped.forEach(i=>{
document.querySelectorAll('.mem-card')[i].classList.remove('flipped');
});
flipped=[];
lock=false;
},400);
},500);
}
}
}

function showDone(){
const text=s('done-text');
const rate=moves<=20?'完美！':moves<=28?'很棒！':moves<=36?'不錯，還有進步空間':'可以再練習一下';
text.innerHTML=`你在 <strong>${timerSec} 秒</strong>內，用了 <strong>${moves} 步</strong>完成配對。<br>${rate}`;
const list=s('done-pairs');
list.innerHTML='<strong>📖 配對內容回顧：</strong><br>'+PAIRS.map(p=>`<span style="color:var(--navy);font-weight:700">${p.term}</span>：${p.def}`).join('<br>');
showScreen('screen-done');
}

function resetGame(){
if(timerInt)clearInterval(timerInt);
startGame();
}
</script>
</body>
</html>
