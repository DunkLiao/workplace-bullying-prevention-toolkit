<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>是非快問快答｜職場霸凌防治</title>
<style>
:root{--navy:#1a3a5c;--navy-dark:#122a44;--navy-light:#2a5080;--gold:#c9a84c;--gold-light:#f0d080;--bg:#f4f7fb;--card-bg:#fff;--text:#1e2a38;--text-muted:#5a6a7a;--border:#d0dce8;--correct:#1e7e44;--correct-bg:#e6f9ed;--wrong:#b91c1c;--wrong-bg:#fde8e8;--radius:12px;--shadow:0 4px 20px rgba(26,58,92,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","Microsoft JhengHei","PingFang TC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px}
.container{width:100%;max-width:720px}
.game-header{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.game-header .logo-badge{width:44px;height:44px;background:var(--navy);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.game-header h1{font-size:17px;color:var(--navy);font-weight:700;line-height:1.35}
.game-header p{font-size:12px;color:var(--text-muted);margin-top:2px}
.card{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;border:1px solid var(--border)}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.timer-box{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:10px 16px;border:1px solid var(--border)}
.timer-icon{font-size:22px}
.timer-num{font-size:24px;font-weight:800;color:var(--navy)}
.timer-urgent{color:var(--wrong);animation:pulse .6s infinite}
@keyframes pulse{50%{transform:scale(1.1)}}
.score-box{display:flex;align-items:center;gap:8px;background:var(--bg);border-radius:10px;padding:10px 16px;border:1px solid var(--border)}
.score-num{font-size:24px;font-weight:800;color:var(--correct)}
.streak-box{font-size:13px;color:var(--gold);font-weight:700}
.question-card{background:var(--bg);border-radius:10px;padding:20px;text-align:center;margin-bottom:20px;border:2px solid var(--border);min-height:100px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;line-height:1.7;transition:border-color .3s}
.question-card.correct-flash{border-color:var(--correct);background:var(--correct-bg)}
.question-card.wrong-flash{border-color:var(--wrong);background:var(--wrong-bg)}
.tf-btns{display:flex;gap:12px;margin-bottom:16px}
.tf-btn{flex:1;padding:20px;border:2px solid var(--border);border-radius:12px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.tf-btn.btn-true:hover:not(:disabled){border-color:var(--correct);background:var(--correct-bg)}
.tf-btn.btn-false:hover:not(:disabled){border-color:var(--wrong);background:var(--wrong-bg)}
.tf-btn:disabled{cursor:default;opacity:.7}
.feedback-flash{text-align:center;font-size:15px;font-weight:700;padding:10px;border-radius:8px;margin-bottom:12px;display:none}
.feedback-flash.show{display:block}
.feedback-flash.correct{color:var(--correct);background:var(--correct-bg)}
.feedback-flash.wrong{color:var(--wrong);background:var(--wrong-bg)}
.explain-box{background:var(--bg);border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.7;margin-bottom:12px;display:none;border:1px solid var(--border)}
.explain-box.show{display:block}
.countdown-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:8px}
.countdown-fill{height:100%;background:var(--correct);border-radius:99px;transition:width .1s linear}
.countdown-fill.warning{background:var(--gold)}
.countdown-fill.danger{background:var(--wrong)}
.welcome-icon{font-size:52px;text-align:center;margin-bottom:16px}
.welcome-title{font-size:22px;font-weight:800;color:var(--navy-dark);text-align:center;margin-bottom:10px}
.welcome-subtitle{text-align:center;color:var(--text-muted);font-size:14px;margin-bottom:24px;line-height:1.7}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.info-item{background:var(--bg);border-radius:10px;padding:14px 10px;text-align:center;border:1px solid var(--border)}
.info-item .info-num{font-size:26px;font-weight:800;color:var(--navy)}
.info-item .info-label{font-size:12px;color:var(--text-muted);margin-top:2px}
.btn-start{width:100%;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:16px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer}
.btn-start:hover{background:var(--navy-light)}
.result-wrap{text-align:center;margin-bottom:20px}
.result-icon{font-size:56px;margin-bottom:12px}
.result-score-big{font-size:48px;font-weight:800;color:var(--navy)}
.result-detail{font-size:14px;color:var(--text-muted);line-height:1.7;margin-top:8px}
.btn-retry{width:100%;background:var(--navy);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:16px}
.btn-retry:hover{background:var(--navy-light)}
.footer-note{text-align:center;font-size:11px;color:var(--text-muted);margin-top:20px;line-height:1.6}
.screen{animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.card{padding:20px 14px}.tf-btn{font-size:16px;padding:16px}}
</style>
</head>
<body>
<div class="container">
<div class="game-header">
<div class="logo-badge">⚡</div>
<div><h1>是非快問快答</h1><p>60 秒倒數——你能答對幾題？</p></div>
</div>

<div id="screen-welcome" class="screen">
<div class="card">
<div class="welcome-icon">⏱️</div>
<h2 class="welcome-title">打破職場霸凌迷思</h2>
<p class="welcome-subtitle">關於職場霸凌，有太多似是而非的觀念。<br>60 秒倒數計時，是非題快問快答！</p>
<div class="info-grid">
<div class="info-item"><div class="info-num">60s</div><div class="info-label">限時挑戰</div></div>
<div class="info-item"><div class="info-num">⭕/❌</div><div class="info-label">是非題型</div></div>
<div class="info-item"><div class="info-num">+10/-5</div><div class="info-label">加扣分制</div></div>
</div>
<button class="btn-start" onclick="startGame()">開始挑戰 →</button>
</div>
<p class="footer-note">依《職業安全衛生法》及《職場霸凌防治措施準則》設計</p>
</div>

<div id="screen-game" class="screen" style="display:none">
<div class="card">
<div class="top-bar">
<div class="timer-box"><span class="timer-icon">⏱</span><span class="timer-num" id="timer">60</span></div>
<div class="score-box"><span>🏆</span><span class="score-num" id="score">0</span><span style="font-size:12px;color:var(--text-muted)">分</span></div>
<div class="streak-box" id="streak"></div>
</div>
<div class="countdown-bar"><div class="countdown-fill" id="countdown-fill" style="width:100%"></div></div>
<div class="question-card" id="question-card"></div>
<div class="feedback-flash" id="fb-flash"></div>
<div class="explain-box" id="explain"></div>
<div class="tf-btns">
<button class="tf-btn btn-true" id="btn-true" onclick="answer(true)">⭕ 正確</button>
<button class="tf-btn btn-false" id="btn-false" onclick="answer(false)">❌ 錯誤</button>
</div>
</div>
</div>

<div id="screen-over" class="screen" style="display:none">
<div class="card">
<div class="result-wrap">
<div class="result-icon" id="result-icon"></div>
<div class="result-score-big" id="final-score">0</div>
<div style="font-size:13px;color:var(--text-muted)">分</div>
<p class="result-detail" id="final-detail"></p>
</div>
<button class="btn-retry" onclick="resetGame()">🔄 再挑戰一次</button>
</div>
<p class="footer-note">若遇職場霸凌，請撥 1925 安心專線</p>
</div>
</div>

<script>
const QUESTIONS=[
{q:"主管在公開場合罵員工「廢物」三個月，不構成霸凌，因為這是管理手段。",answer:false,expl:"❌ 持續性公開侮辱構成霸凌。正當管理不包含人格羞辱，應私下給予具體、建設性回饋。"},
{q:"正當的工作指導和績效管理，不構成職場霸凌。",answer:true,expl:"✅ 正確。準則明定合理的工作指導、績效評核屬於正當管理，不列入霸凌範疇。"},
{q:"只有主管欺負下屬才算職場霸凌，同事之間不算。",answer:false,expl:"❌ 同事之間的霸凌也構成職場霸凌。§22-1 定義涵蓋「雇主、主管或同事等」。"},
{q:"客戶對員工咆哮辱罵，雇主沒有責任，因為客戶不是公司的人。",answer:false,expl:"❌ §22-2 明定雇主對第三人（含客戶）的霸凌行為有防治義務，須有 SOP 與事後關懷。"},
{q:"只要沒有肢體暴力，言語嘲諷和不實謠言不算霸凌。",answer:false,expl:"❌ 霸凌不限肢體暴力。言語攻擊、散布謠言、排斥孤立都是典型霸凌樣態。"},
{q:"申訴後雇主若把你調職，只要用「業務調整」當理由就合法。",answer:false,expl:"❌ §22-4 不利對待禁止條款：雇主不得因申訴而施以調職等不利處分，即使以業務調整為名。"},
{q:"員工因工作表現不佳而被啟動 PIP（績效改善計畫），是正當的人事管理。",answer:true,expl:"✅ 依程序啟動 PIP 是正當管理。關鍵：客觀不達標事實、明確目標、資源支援。若惡意設不可達成目標則可能變質。"},
{q:"職場霸凌必須是「持續性」的，單次事件永遠不構成霸凌。",answer:false,expl:"❌ 準則規定情節重大者，單次事件也可能構成霸凌。不須一律以持續為必要。"},
{q:"員工若提出霸凌申訴但調查不成立，可能會被反告誣告。",answer:false,expl:"❌ 僅有「經調查證實惡意虛構」者才可能面臨懲戒。一般申訴不成立不構成誣告。§22-4 保護善意申訴人。"},
{q:"百人以上公司受理申訴後，必須在 15 個工作日內組成調查小組。",answer:true,expl:"✅ 準則規定一百人以上事業單位，應於受理申訴後 15 個工作日內組成調查小組，外聘不少於 1/2。"},
{q:"申訴處理的相關紀錄只要結案就可以銷毀。",answer:false,expl:"❌ 申訴案件結案後，相關紀錄至少須保存 3 年。"},
{q:"員工不服申訴決定，可以無限次提起申復。",answer:false,expl:"❌ 申復以一次為限。須於收到決定翌日起 30 日內提起。"},
{q:"如果被申訴人是公司董事長，勞工可以向地方主管機關直接申訴。",answer:true,expl:"✅ 若被申訴人為最高負責人，勞工得逕向地方主管機關提出申訴。"},
{q:"調查過程中，申訴人和被申訴人必須當面對質。",answer:false,expl:"❌ 地方主管機關調查最高負責人事件時，不令當事人或相關人對質。一般內部調查亦以不公開為原則。"},
{q:"調查小組成員可以完全由公司內部人員組成。",answer:false,expl:"❌ 百人以上事業單位的調查小組，外聘成員比例不得少於二分之一。"},
{q:"申訴處理單位成員的任一性別比例不得少於三分之一。",answer:true,expl:"✅ 準則規定申訴處理單位成員至少三位，任一性別比例不得少於三分之一。"},
{q:"員工只能在霸凌行為發生後六個月內提出申訴。",answer:false,expl:"❌ 申訴期限為行為終了起三年內。若行為人利用權勢，則自離職日起一年內。"},
{q:"雇主知悉霸凌後，即使員工沒有申訴意願，仍應採取適當措施。",answer:true,expl:"✅ §22-2 規定，即使無申訴意願，雇主仍應採取適當措施並留存處理紀錄。"}
];

let timer=60,timerInt=null,score=0,streak=0,maxStreak=0,answered=0,correct=0,currentQ=null,lock=false,perQTimer=null,perQLeft=5;

function s(id){return document.getElementById(id)}
function showScreen(id){['screen-welcome','screen-game','screen-over'].forEach(x=>s(x).style.display='none');s(id).style.display='block';window.scrollTo(0,0)}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let qPool=[],qIdx=0;

function startGame(){
timer=60;score=0;streak=0;maxStreak=0;answered=0;correct=0;lock=false;qPool=shuffle([...QUESTIONS]);qIdx=0;
showScreen('screen-game');
s('timer').textContent='60';s('timer').className='timer-num';
s('score').textContent='0';s('streak').textContent='';
s('countdown-fill').style.width='100%';s('countdown-fill').className='countdown-fill';
s('fb-flash').className='feedback-flash';s('explain').className='explain-box';
s('question-card').className='question-card';
document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=false);
nextQ();
if(timerInt)clearInterval(timerInt);
timerInt=setInterval(()=>{
timer--;s('timer').textContent=timer;
s('countdown-fill').style.width=`${(timer/60)*100}%`;
if(timer<=15){s('timer').classList.add('timer-urgent');s('countdown-fill').classList.add('danger')}
else if(timer<=30)s('countdown-fill').classList.add('warning');
if(timer<=0){endGame()}
},1000);
}

function nextQ(){
if(qIdx>=qPool.length){qPool=shuffle([...QUESTIONS]);qIdx=0}
currentQ=qPool[qIdx++];
s('question-card').textContent=currentQ.q;
s('question-card').className='question-card';
s('fb-flash').className='feedback-flash';
s('explain').className='explain-box';
lock=false;
document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=false);
perQLeft=5;
if(perQTimer)clearInterval(perQTimer);
}

function answer(userAnswer){
if(lock||timer<=0)return;
lock=true;
answered++;
const isCorrect=userAnswer===currentQ.answer;
if(isCorrect){score+=10;correct++;streak++;if(streak>maxStreak)maxStreak=streak}
else{score=Math.max(0,score-5);streak=0}
s('score').textContent=score;
s('streak').textContent=streak>=3?`🔥 連續 ${streak} 題正確！`:'';
const card=s('question-card');
const fb=s('fb-flash'),ex=s('explain');
if(isCorrect){card.classList.add('correct-flash');fb.className='feedback-flash correct show';fb.textContent='✅ 正確！+10 分'}
else{card.classList.add('wrong-flash');fb.className='feedback-flash wrong show';fb.textContent='❌ 錯誤！-5 分'}
ex.innerHTML='<strong>解析：</strong>'+currentQ.expl;
ex.className='explain-box show';
document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
setTimeout(()=>{if(timer>0)nextQ()},1200);
}

function endGame(){
clearInterval(timerInt);
if(perQTimer)clearInterval(perQTimer);
showScreen('screen-over');
s('final-score').textContent=score;
let icon,detail;
if(score>=80){icon='🏆';detail=`太強了！你在 ${60-timer} 秒內答對 ${correct}/${answered} 題，得分 ${score} 分。你對職場霸凌法規的認識相當全面！`}
else if(score>=50){icon='👍';detail=`不錯！答對 ${correct}/${answered} 題，得分 ${score} 分。持續學習會更精進。`}
else if(score>=20){icon='📖';detail=`答對 ${correct}/${answered} 題，得分 ${score} 分。還有很多迷思需要澄清，建議多閱讀法規資料。`}
else{icon='💪';detail=`答對 ${correct}/${answered} 題，得分 ${score} 分。沒關係，學習才剛開始！建議參加教育訓練。`}
s('result-icon').textContent=icon;
s('final-detail').textContent=detail;
}

function resetGame(){startGame()}
</script>
</body>
</html>
