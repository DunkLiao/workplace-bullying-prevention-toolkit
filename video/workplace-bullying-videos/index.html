<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0a1628; }
      body { font-family: "Noto Sans TC", sans-serif; }
      .bg-gradient { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0f2847 60%, #132e4d 100%); }
      .accent-bar { position: absolute; top: 0; left: 0; width: 1920px; height: 6px; background: linear-gradient(90deg, #2563eb, #3b82f6, #60a5fa, #3b82f6, #2563eb); }
      .content-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      h1 { font-size: 72px; font-weight: 900; color: #fff; text-align: center; }
      .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 60px 80px; text-align: center; }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-j7pz" id="root" data-composition-id="main" data-start="0" data-duration="30" data-width="1920" data-height="1080">
      <div data-hf-id="hf-mgwf" class="clip" data-start="0" data-duration="30" data-track-index="0">
        <div data-hf-id="hf-zb1e" class="bg-gradient"></div>
        <div data-hf-id="hf-ty56" class="accent-bar"></div>
      </div>
      <div data-hf-id="hf-xbim" id="title" class="clip" data-start="0" data-duration="30" data-track-index="1">
        <div data-hf-id="hf-fz43" class="content-area">
          <div data-hf-id="hf-vn2y" class="card">
            <h1 data-hf-id="hf-neip">職場霸凌防治宣導影片合集</h1>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#title .card", { opacity: 0, scale: 0.9, duration: 0.8 }, 0);
      tl.from("#title h1", { opacity: 0, y: 30, duration: 0.7 }, 0.3);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
