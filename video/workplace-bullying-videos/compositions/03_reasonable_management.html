<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0b1a2e; }
      body { font-family: "Noto Sans TC", sans-serif; }
      .bg-gradient { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: linear-gradient(180deg, #0b1a2e 0%, #132843 100%); }
      .bg-line { position: absolute; top: 540px; left: 0; width: 1920px; height: 2px; background: rgba(96,165,250,0.3); }
      .accent-bar { position: absolute; top: 0; left: 0; width: 1920px; height: 6px; background: linear-gradient(90deg, #22c55e, #3b82f6, #ef4444, #3b82f6, #22c55e); }
      .content-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 55px 75px; max-width: 1550px; text-align: center; }
      h1 { font-size: 60px; font-weight: 900; color: #fff; margin-bottom: 18px; }
      h2 { font-size: 38px; font-weight: 700; color: #94a3b8; margin-bottom: 22px; }
      p { font-size: 30px; color: #e2e8f0; line-height: 1.8; }
      .highlight-green { color: #4ade80; font-weight: 700; }
      .highlight-red { color: #f87171; font-weight: 700; }
      .highlight-blue { color: #60a5fa; font-weight: 700; }
      .vs-container { display: grid; grid-template-columns: 1fr 80px 1fr; align-items: center; gap: 0; margin-top: 25px; }
      .side-card { border-radius: 16px; padding: 40px 30px; }
      .side-card.good { background: rgba(34,197,94,0.08); border: 2px solid rgba(34,197,94,0.3); }
      .side-card.bad { background: rgba(239,68,68,0.08); border: 2px solid rgba(239,68,68,0.3); }
      .side-card .title { font-size: 38px; font-weight: 700; margin-bottom: 15px; }
      .side-card.good .title { color: #4ade80; }
      .side-card.bad .title { color: #f87171; }
      .side-card ul { list-style: none; text-align: left; }
      .side-card li { font-size: 24px; color: #cbd5e1; padding: 8px 0; }
      .side-card.good li:before { content: '> '; color: #4ade80; }
      .side-card.bad li:before { content: '> '; color: #f87171; }
      .vs-text { font-size: 48px; font-weight: 900; color: #fbbf24; text-align: center; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="video03" data-start="0" data-duration="30" data-width="1920" data-height="1080">
      <div class="clip" data-start="0" data-duration="30" data-track-index="0">
        <div class="bg-gradient"></div>
        <div class="bg-line"></div>
        <div class="accent-bar"></div>
      </div>
      <div id="scene1" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>合理管理 vs 職場霸凌</h1>
            <h2>主管的界線在哪裡？</h2>
          </div>
        </div>
      </div>
      <div id="scene2" class="clip" data-start="5" data-duration="9" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1 style="font-size:48px">一線之隔，差別很大</h1>
            <div class="vs-container">
              <div class="side-card good">
                <div class="title">合理管理</div>
                <ul>
                  <li>明確的績效標準</li>
                  <li>建設性回饋</li>
                  <li>公平的獎懲制度</li>
                  <li>合理的任務指派</li>
                  <li>尊重溝通方式</li>
                </ul>
              </div>
              <div class="vs-text">VS</div>
              <div class="side-card bad">
                <div class="title">職場霸凌</div>
                <ul>
                  <li>不合理的苛責</li>
                  <li>人身攻擊言論</li>
                  <li>差別對待排擠</li>
                  <li>刻意羞辱刁難</li>
                  <li>持續性打壓</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="scene3" class="clip" data-start="14" data-duration="8" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>判斷關鍵</h1>
            <p style="margin-top:25px;font-size:34px"><span class="highlight-green">合理管理</span>：基於業務需要，出於善意<br><span class="highlight-red">職場霸凌</span>：超越合理範圍，具惡意</p>
          </div>
        </div>
      </div>
      <div id="scene4" class="clip" data-start="22" data-duration="8" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>主管請注意</h1>
            <p style="margin-top:25px;font-size:34px">管理行為需<span class="highlight-blue">合理且適當</span><br>不得逾越業務必要性<br>尊重員工<span class="highlight-blue">人格尊嚴</span></p>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#scene1 .card", { opacity: 0, scale: 0.85, duration: 0.8 }, 0);
      tl.from("#scene1 h1", { opacity: 0, y: 30, duration: 0.7 }, 0.3);
      tl.from("#scene1 h2", { opacity: 0, y: 20, duration: 0.6 }, 0.8);
      tl.from("#scene2 .card", { opacity: 0, y: -60, duration: 0.8 }, 5);
      tl.from("#scene2 h1", { opacity: 0, y: 20, duration: 0.5 }, 5.3);
      tl.from("#scene2 .side-card", { opacity: 0, scale: 0.9, duration: 0.5, stagger: 0.3 }, 5.8);
      tl.from("#scene2 .vs-text", { opacity: 0, scale: 0, duration: 0.5 }, 6.3);
      tl.from("#scene3 .card", { opacity: 0, x: -60, duration: 0.8 }, 14);
      tl.from("#scene3 h1", { opacity: 0, y: -20, duration: 0.5 }, 14.3);
      tl.from("#scene3 p", { opacity: 0, y: 20, duration: 0.5 }, 14.8);
      tl.from("#scene4 .card", { opacity: 0, x: 60, duration: 0.8 }, 22);
      tl.from("#scene4 h1", { opacity: 0, y: -20, duration: 0.5 }, 22.3);
      tl.from("#scene4 p", { opacity: 0, y: 20, duration: 0.5 }, 22.8);
      window.__timelines["video03"] = tl;
    </script>
  </body>
</html>
