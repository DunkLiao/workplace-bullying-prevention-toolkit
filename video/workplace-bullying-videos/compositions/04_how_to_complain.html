<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0c1a2b; }
      body { font-family: "Noto Sans TC", sans-serif; }
      .bg-gradient { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: linear-gradient(135deg, #0c1a2b 0%, #1a2f47 100%); }
      .accent-bar { position: absolute; top: 0; left: 0; width: 1920px; height: 6px; background: linear-gradient(90deg, #3b82f6, #06b6d4, #3b82f6); }
      .content-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 55px 75px; max-width: 1450px; text-align: center; }
      h1 { font-size: 64px; font-weight: 900; color: #fff; margin-bottom: 18px; }
      h2 { font-size: 38px; font-weight: 700; color: #94a3b8; margin-bottom: 22px; }
      p { font-size: 30px; color: #e2e8f0; line-height: 1.8; }
      .highlight { color: #60a5fa; font-weight: 700; }
      .channels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
      .channel-card { background: rgba(37,99,235,0.06); border: 1px solid rgba(37,99,235,0.2); border-radius: 14px; padding: 30px 20px; text-align: center; }
      .channel-card .icon { font-size: 40px; margin-bottom: 10px; }
      .channel-card .name { font-size: 28px; color: #60a5fa; font-weight: 700; }
      .channel-card .detail { font-size: 20px; color: #94a3b8; margin-top: 8px; }
      .step-list { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; text-align: left; }
      .step-item { display: flex; align-items: center; gap: 20px; padding: 18px 30px; background: rgba(37,99,235,0.08); border-radius: 14px; border-left: 4px solid #3b82f6; }
      .step-num { font-size: 36px; font-weight: 900; color: #3b82f6; min-width: 50px; text-align: center; }
      .step-text { font-size: 28px; color: #e2e8f0; }
      .callout { margin-top: 30px; font-size: 34px; font-weight: 700; color: #fbbf24; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="video04" data-start="0" data-duration="30" data-width="1920" data-height="1080">
      <div class="clip" data-start="0" data-duration="30" data-track-index="0">
        <div class="bg-gradient"></div>
        <div class="accent-bar"></div>
      </div>
      <div id="scene1" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>如何提出申訴</h1>
            <h2>面對職場霸凌，你不需要獨自承受</h2>
          </div>
        </div>
      </div>
      <div id="scene2" class="clip" data-start="5" data-duration="9" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1 style="font-size:50px">申訴管道</h1>
            <div class="channels">
              <div class="channel-card"><div class="icon">&#x1F4E7;</div><div class="name">內部申訴信箱</div><div class="detail">向公司申訴處理單位提出</div></div>
              <div class="channel-card"><div class="icon">&#x1F4DE;</div><div class="name">申訴專線</div><div class="detail">直接致電公司專責窗口</div></div>
              <div class="channel-card"><div class="icon">&#x1F3E2;</div><div class="name">勞動部專區</div><div class="detail">向地方主管機關提出申訴</div></div>
            </div>
          </div>
        </div>
      </div>
      <div id="scene3" class="clip" data-start="14" data-duration="8" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1 style="font-size:50px">申訴四步驟</h1>
            <div class="step-list">
              <div class="step-item"><div class="step-num">1</div><div class="step-text">紀錄霸凌事件的時間、地點、行為及證人</div></div>
              <div class="step-item"><div class="step-num">2</div><div class="step-text">透過內部管道向申訴處理單位提出</div></div>
              <div class="step-item"><div class="step-num">3</div><div class="step-text">收到受理通知：10 個工作日內</div></div>
              <div class="step-item"><div class="step-num">4</div><div class="step-text">配合調查程序，提供相關事證</div></div>
            </div>
          </div>
        </div>
      </div>
      <div id="scene4" class="clip" data-start="22" data-duration="8" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>你受法律保護</h1>
            <p style="margin-top:25px;font-size:34px">雇主不得因申訴而對你<span class="highlight">不利對待</span></p>
            <div class="callout">勇敢發聲，守護職場正義</div>
          </div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      tl.from("#scene1 .card", { opacity: 0, y: -60, duration: 0.8 }, 0);
      tl.from("#scene1 h1", { opacity: 0, scale: 0.85, duration: 0.7 }, 0.3);
      tl.from("#scene1 h2", { opacity: 0, y: 20, duration: 0.6 }, 0.8);
      tl.from("#scene2 .card", { opacity: 0, x: -80, duration: 0.8 }, 5);
      tl.from("#scene2 h1", { opacity: 0, y: 20, duration: 0.5 }, 5.3);
      tl.from("#scene2 .channel-card", { opacity: 0, y: 50, duration: 0.4, stagger: 0.2 }, 5.8);
      tl.from("#scene3 .card", { opacity: 0, scale: 0.9, duration: 0.8 }, 14);
      tl.from("#scene3 h1", { opacity: 0, y: -20, duration: 0.5 }, 14.3);
      tl.from("#scene3 .step-item", { opacity: 0, x: 60, duration: 0.4, stagger: 0.15 }, 14.8);
      tl.from("#scene4 .card", { opacity: 0, y: 80, duration: 0.8 }, 22);
      tl.from("#scene4 h1", { opacity: 0, y: -20, duration: 0.5 }, 22.3);
      tl.from("#scene4 p", { opacity: 0, y: 20, duration: 0.5 }, 22.8);
      tl.from("#scene4 .callout", { opacity: 0, scale: 0.7, duration: 0.5 }, 23.5);
      window.__timelines["video04"] = tl;
    </script>
  </body>
</html>
