<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0a1628; }
      body { font-family: "Noto Sans TC", sans-serif; }
      .bg-gradient { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: linear-gradient(135deg, #0a1628 0%, #0d2137 30%, #0f2847 60%, #132e4d 100%); }
      .accent-bar { position: absolute; top: 0; left: 0; width: 1920px; height: 6px; background: linear-gradient(90deg, #2563eb, #3b82f6, #60a5fa, #3b82f6, #2563eb); }
      .content-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 60px 80px; max-width: 1400px; text-align: center; }
      .icon-circle { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 30px; background: linear-gradient(135deg, #2563eb, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 48px; }
      h1 { font-size: 72px; font-weight: 900; color: #fff; margin-bottom: 20px; letter-spacing: 0.05em; }
      h2 { font-size: 48px; font-weight: 700; color: #60a5fa; margin-bottom: 30px; }
      p { font-size: 32px; font-weight: 400; color: #cbd5e1; line-height: 1.8; }
      .highlight { color: #60a5fa; font-weight: 700; }
      .law-ref { font-size: 28px; color: #94a3b8; margin-top: 30px; padding: 15px 30px; background: rgba(37,99,235,0.15); border-radius: 12px; display: inline-block; }
      .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; margin-top: 20px; }
      .grid-item { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px 30px; text-align: center; }
      .grid-item .num { font-size: 56px; font-weight: 900; color: #3b82f6; }
      .grid-item .label { font-size: 28px; color: #e2e8f0; margin-top: 10px; }
      .callout { margin-top: 40px; font-size: 36px; font-weight: 700; color: #fbbf24; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="video01" data-start="0" data-duration="30" data-width="1920" data-height="1080">
      <div class="clip" data-start="0" data-duration="30" data-track-index="0">
        <div class="bg-gradient"></div>
        <div class="accent-bar"></div>
      </div>
      <div id="scene1" class="clip" data-start="0" data-duration="5" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <div class="icon-circle">&#x1F6E1;</div>
            <h1>認識職場霸凌</h1>

          </div>
        </div>
      </div>
      <div id="scene2" class="clip" data-start="5" data-duration="9" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>職安法定義</h1>
            <p style="margin-top:20px">依<span class="highlight">《職業安全衛生法》§22-1</span></p>
            <p style="font-size:28px;margin-top:20px">勞工於執行職務時，遭<span class="highlight">同一人或多人</span><br>以<span class="highlight">持續性</span>之言語、態度或行為<br>施以<span class="highlight">侵犯、威脅、孤立或侮辱</span><br>致生<span class="highlight">身心壓力或不利勞動條件</span></p>
          </div>
        </div>
      </div>
      <div id="scene3" class="clip" data-start="14" data-duration="8" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>三大構成要件</h1>
            <div class="grid-3" style="margin-top:30px">
              <div class="grid-item"><div class="num">01</div><div class="label">持續性行為</div></div>
              <div class="grid-item"><div class="num">02</div><div class="label">不利對待</div></div>
              <div class="grid-item"><div class="num">03</div><div class="label">身心壓力</div></div>
            </div>
          </div>
        </div>
      </div>
      <div id="scene4" class="clip" data-start="22" data-duration="8" data-track-index="1">
        <div class="content-area">
          <div class="card">
            <h1>每個人都該知道</h1>

            <p>保護<span class="highlight">每一位勞工</span>的權益</p>
            <div class="callout">職場霸凌 = 違法行為</div>
            <div class="law-ref">2026年7月1日正式施行</div>
          </div>
        </div>
      </div>
    </div>
