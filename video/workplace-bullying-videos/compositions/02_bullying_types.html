      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0f172a; }

      .type-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 25px; margin-top: 25px; }
      .type-card { border-radius: 16px; padding: 40px 25px; text-align: center; border: 2px solid; }

      .type-card.psych .title { color: #fbbf24; }
      .type-card.behavior .title { color: #4ade80; }
      .type-card .desc { font-size: 22px; color: #cbd5e1; line-height: 1.6; }
