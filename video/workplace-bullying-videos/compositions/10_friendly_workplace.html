<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #052e16; }
      body { font-family: "Noto Sans TC", sans-serif; }
      .bg-gradient { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; background: linear-gradient(160deg, #052e16 0%, #064e3b 30%, #065f46 60%, #047857 100%); }
      .accent-bar { position: absolute; top: 0; left: 0; width: 1920px; height: 6px; background: linear-gradient(90deg, #22c55e, #10b981, #34d399, #10b981, #22c55e); }
      .content-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 50px 70px; max-width: 1450px; text-align: center; }
      h1 { font-size: 56px; font-weight: 900; color: #fff; margin-bottom: 16px; }
      h2 { font-size: 34px; font-weight: 700; color: #6ee7b7; margin-bottom: 20px; }
      p { font-size: 28px; color: #d1fae5; line-height: 1.8; }
      .highlight { color: #34d399; font-weight: 700; }
      .roles-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; margin-top: 18px; }
      .role-card { background: rgba(52,211,153,0.06); border: 1px solid rgba(52,211,153,0.2); border-radius: 14px; padding: 32px 22px; text-align: center; }
      .role-card .emoji { font-size: 44px; margin-bottom: 10px; }
      .role-card .name { font-size: 28px; color: #34d399; font-weight: 700; margin-bottom: 8px; }
      .role-card .action { font-size: 22px; color: #d1fae5; line-height: 1.6; }
      .heart { font-size: 60px; margin-bottom: 10px; }
      .tagline { font-size: 38px; font-weight: 700; color: #fbbf24; margin-top: 18px; }
    </style>
  </head>

              <div class="role-card">

              <div class="role-card">

        </div>
      </div>

          </div>
        </div>
      </div>
    </div>
